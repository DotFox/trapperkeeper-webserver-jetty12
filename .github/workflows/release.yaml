name: release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  packages: write

jobs:
  verify-release-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1

          main_sha="$(git rev-parse origin/main)"

          if [[ "$GITHUB_SHA" != "$main_sha" ]]; then
            echo "Tag $GITHUB_REF_NAME must point to the current origin/main tip"
            echo "tag sha:  $GITHUB_SHA"
            echo "main sha: $main_sha"
            exit 1
          fi

      - name: Derive release version from tag
        id: version
        run: |
          version="${GITHUB_REF_NAME#v}"

          if [[ "$version" == *-SNAPSHOT ]]; then
            echo "Release tags must not resolve to SNAPSHOT versions"
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag $GITHUB_REF_NAME must be in the form vX.Y.Z"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  run-lein-tests:
    name: lein test - Java ${{ matrix.java }}
    needs: verify-release-tag
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '17', '21' ]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          lein: latest

      - name: Run lein tests with dev test profile
        run: lein with-profile dev test

      - name: Run lein tests with fips profile
        run: lein with-profile fips test

  publish-package:
    name: Publish package
    needs: [verify-release-tag, run-lein-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.2
        with:
          lein: latest

      - name: Set release version from tag
        env:
          RELEASE_VERSION: ${{ needs.verify-release-tag.outputs.version }}
        run: |
          perl -0pi -e 's/\(defproject\s+dev\.dotfox\/trapperkeeper-webserver-jetty12\s+"[^"]+"/(defproject dev.dotfox\/trapperkeeper-webserver-jetty12 "'"$RELEASE_VERSION"'"/' project.clj
          sed -n '1p' project.clj

      - name: Prepare package
        run: lein with-profile +provided do clean, jar

      - name: Publish package
        env:
          DEFAULT_DEPLOY_RELEASES_URL: ${{ format('https://maven.pkg.github.com/{0}', github.repository) }}
          DEFAULT_DEPLOY_USERNAME: ${{ github.actor }}
          DEFAULT_DEPLOY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_RELEASES_URL_OVERRIDE: ${{ vars.DEPLOY_RELEASES_URL }}
          DEPLOY_SNAPSHOTS_URL_OVERRIDE: ${{ vars.DEPLOY_SNAPSHOTS_URL }}
          DEPLOY_USERNAME_OVERRIDE: ${{ vars.DEPLOY_USERNAME }}
          DEPLOY_PASSWORD_OVERRIDE: ${{ secrets.DEPLOY_PASSWORD }}
        run: |
          export DEPLOY_RELEASES_URL="${DEPLOY_RELEASES_URL_OVERRIDE:-$DEFAULT_DEPLOY_RELEASES_URL}"
          export DEPLOY_SNAPSHOTS_URL="${DEPLOY_SNAPSHOTS_URL_OVERRIDE:-$DEPLOY_RELEASES_URL}"
          export DEPLOY_USERNAME="${DEPLOY_USERNAME_OVERRIDE:-$DEFAULT_DEPLOY_USERNAME}"
          export DEPLOY_PASSWORD="${DEPLOY_PASSWORD_OVERRIDE:-$DEFAULT_DEPLOY_PASSWORD}"

          lein with-profile +provided deploy releases

  bump-snapshot-version:
    name: Bump main to next snapshot
    needs: [verify-release-tag, publish-package]
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Verify main did not move
        run: |
          git fetch origin main

          main_sha="$(git rev-parse origin/main)"

          if [[ "$main_sha" != "$GITHUB_SHA" ]]; then
            echo "origin/main moved during the release run; refusing to bump version automatically"
            echo "tag sha:  $GITHUB_SHA"
            echo "main sha: $main_sha"
            exit 1
          fi

      - name: Set next snapshot version
        env:
          RELEASE_VERSION: ${{ needs.verify-release-tag.outputs.version }}
        run: |
          IFS='.' read -r major minor patch <<< "$RELEASE_VERSION"
          next_patch=$((patch + 1))
          next_version="${major}.${minor}.${next_patch}-SNAPSHOT"

          perl -0pi -e 's/\(defproject\s+dev\.dotfox\/trapperkeeper-webserver-jetty12\s+"[^"]+"/(defproject dev.dotfox\/trapperkeeper-webserver-jetty12 "'"$next_version"'"/' project.clj
          sed -n '1p' project.clj

      - name: Commit next snapshot version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.clj
          git commit -m "Prepare next development version"

      - name: Push snapshot bump to main
        run: git push origin HEAD:main
